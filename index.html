<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mut-kjbot Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root" class="p-6">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-2xl font-bold text-gray-900 mb-6">Dashboard</h1>
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-5 rounded-xl border">
          <div class="text-2xl font-bold">4</div>
          <div class="text-gray-500 text-sm">Total Bots</div>
        </div>
        <div class="bg-white p-5 rounded-xl border">
          <div class="text-2xl font-bold">8</div>
          <div class="text-gray-500 text-sm">Skills</div>
        </div>
        <div class="bg-white p-5 rounded-xl border">
          <div class="text-2xl font-bold">156</div>
          <div class="text-gray-500 text-sm">Messages</div>
        </div>
        <div class="bg-white p-5 rounded-xl border">
          <div class="text-2xl font-bold">4</div>
          <div class="text-gray-500 text-sm">Active</div>
        </div>
      </div>
      <div class="bg-white rounded-xl border">
        <div class="p-4 border-b font-semibold">Bot List</div>
        <div class="p-4 border-b flex justify-between">
          <span>选品Bot</span>
          <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Active</span>
        </div>
        <div class="p-4 border-b flex justify-between">
          <span>投放Bot</span>
          <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Active</span>
        </div>
        <div class="p-4 flex justify-between">
          <span>运营Bot</span>
          <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Active</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
